<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texas Hold'em Poker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Texas Hold'em Poker</h1>
            <div class="game-info">
                <span class="pot">Pot: $<span id="pot-amount">0</span></span>
                <span class="round">Round: <span id="current-round">Pre-Flop</span></span>
            </div>
        </header>

        <div class="game-board">
            <!-- Community Cards -->
            <div class="community-cards">
                <div class="card-placeholder" id="flop-1"></div>
                <div class="card-placeholder" id="flop-2"></div>
                <div class="card-placeholder" id="flop-3"></div>
                <div class="card-placeholder" id="turn"></div>
                <div class="card-placeholder" id="river"></div>
            </div>

            <!-- Player Area -->
            <div class="player-area">
                <div class="player player-1" id="player-1">
                    <div class="player-info">
                        <h3>You</h3>
                        <div class="chips">$<span id="player-1-chips">1000</span></div>
                    </div>
                    <div class="player-cards">
                        <div class="card" id="player-1-card-1"></div>
                        <div class="card" id="player-1-card-2"></div>
                    </div>
                    <div class="player-bet" id="player-1-bet">$0</div>
                </div>

                <div class="player player-2" id="player-2">
                    <div class="player-info">
                        <h3>Computer</h3>
                        <div class="chips">$<span id="player-2-chips">1000</span></div>
                    </div>
                    <div class="player-cards">
                        <div class="card card-back" id="player-2-card-1"></div>
                        <div class="card card-back" id="player-2-card-2"></div>
                    </div>
                    <div class="player-bet" id="player-2-bet">$0</div>
                </div>
            </div>
        </div>

        <!-- Game Controls -->
        <div class="game-controls">
            <div class="betting-controls">
                <div class="bet-amount">
                    <label for="bet-input">Bet Amount:</label>
                    <input type="number" id="bet-input" min="0" value="0">
                </div>
                <div class="bet-buttons">
                    <button id="fold-btn" class="btn btn-fold">Fold</button>
                    <button id="check-btn" class="btn btn-check">Check</button>
                    <button id="call-btn" class="btn btn-call">Call</button>
                    <button id="raise-btn" class="btn btn-raise">Raise</button>
                    <button id="all-in-btn" class="btn btn-all-in">All In</button>
                </div>
            </div>
            <div class="game-actions">
                <button id="new-game-btn" class="btn btn-new-game">New Game</button>
                <button id="deal-btn" class="btn btn-deal">Deal Cards</button>
            </div>
        </div>

        <!-- Game Log -->
        <div class="game-log">
            <h3>Game Log</h3>
            <div id="log-content"></div>
        </div>

        <!-- Hand Evaluation -->
        <div class="hand-evaluation" id="hand-evaluation">
            <h3>Your Hand</h3>
            <div id="hand-description">No cards dealt yet</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
